<!--
Code for integrating CloudFlare's email protection with Hydejack's single page app loading.
-->
<script>
  document.getElementById('_pushState').addEventListener('hy-push-state-after', function (e) {
    function e(e){
      (console.error?console.error:console.log).call(console,e)
    }

    function t(e){
      return l.innerHTML='<a href="'+e.replace(/"/g,"&quot;")+'"></a>',l.childNodes[0].getAttribute("href")
    }

    function r(e,t){
      var r=e.substr(t,2);return parseInt(r,16)
    }

    function n(e,n){
      for(var o="",c=r(e,n),a=n+2;a<e.length;a+=2){
        var l=r(e,a)^c;
        o+=String.fromCharCode(l)
      }
      return t(o)
    }

    var o="/cdn-cgi/l/email-protection#",
        c=".__cf_email__",
        a="data-cfemail",
        l=document.createElement("div");

    !function(){
      for(var t=document.getElementsByTagName("a"),r=0;r<t.length;r++)
        try{
          var c=t[r],a=c.href.indexOf(o);
          a>-1&&(c.href="mailto:"+n(c.href,a+o.length))
        }catch(t){
          e(t)
        }
    }(),
    function(){
      for(var t=document.querySelectorAll(c),r=0;r<t.length;r++)
        try{
          var o=t[r],l=n(o.getAttribute(a),0),i=document.createTextNode(l);
          o.parentNode.replaceChild(i,o)
        }catch(t){
          e(t)
        }
    }()
  });
</script>

<script>
  (function () {
    function normalizeText(value) {
      return (value || '').toLowerCase().trim();
    }

    function scoreResult(entry, tokens) {
      let score = 0;
      const title = normalizeText(entry.title);
      const path = normalizeText(entry.path);
      const body = normalizeText(entry.body);

      for (let i = 0; i < tokens.length; i += 1) {
        const token = tokens[i];
        if (title.indexOf(token) >= 0) score += 10;
        if (path.indexOf(token) >= 0) score += 6;
        if (body.indexOf(token) >= 0) score += 1;
      }

      return score;
    }

    async function buildTopSearchIndex() {
      if (window.__topSearchIndexPromise) {
        return window.__topSearchIndexPromise;
      }

      window.__topSearchIndexPromise = (async function () {
        try {
          const response = await fetch('/sitemap.xml', { credentials: 'same-origin' });
          if (!response.ok) return [];

          const sitemapXml = await response.text();
          const parser = new DOMParser();
          const sitemapDoc = parser.parseFromString(sitemapXml, 'application/xml');
          const locNodes = Array.from(sitemapDoc.querySelectorAll('url > loc'));

          const urls = locNodes
            .map(function (node) { return (node.textContent || '').trim(); })
            .filter(function (value) { return value.length > 0; })
            .map(function (value) { return new URL(value, window.location.origin).href; })
            .filter(function (href) {
              const pathname = new URL(href).pathname;
              return pathname.indexOf('/assets/') !== 0 && pathname !== '/feed.xml' && pathname !== '/robots.txt' && pathname !== '/sitemap.xml';
            });

          const pages = await Promise.all(urls.map(async function (href) {
            try {
              const pageResponse = await fetch(href, { credentials: 'same-origin' });
              if (!pageResponse.ok) return null;

              const html = await pageResponse.text();
              const pageDoc = parser.parseFromString(html, 'text/html');
              const title = (pageDoc.querySelector('title') && pageDoc.querySelector('title').textContent) || '';
              const main = pageDoc.querySelector('main') || pageDoc.body;
              const body = ((main && main.textContent) || '').replace(/\s+/g, ' ').trim();
              const path = new URL(href).pathname;

              return { href: href, path: path, title: title, body: body };
            } catch (error) {
              return null;
            }
          }));

          return pages.filter(function (item) { return item !== null; });
        } catch (error) {
          return [];
        }
      })();

      return window.__topSearchIndexPromise;
    }

    async function openBuiltInSearch(query) {
      const initialInput = document.getElementById('_search-input');
      if (initialInput) {
        initialInput.focus();
        initialInput.value = query;
        initialInput.dispatchEvent(new Event('input', { bubbles: true }));
        return true;
      }

      if (window.location.hash !== '#_search-input') {
        window.location.hash = '_search-input';
      }

      for (let attempt = 0; attempt < 20; attempt += 1) {
        await new Promise(function (resolve) { window.setTimeout(resolve, 60); });
        const searchInput = document.getElementById('_search-input');
        if (searchInput) {
          searchInput.focus();
          searchInput.value = query;
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          return true;
        }
      }

      return false;
    }

    async function runFallbackSiteSearch(query) {
      const trimmedQuery = query.trim();
      if (!trimmedQuery) return;

      const tokens = normalizeText(trimmedQuery).split(/\s+/).filter(function (token) {
        return token.length > 0;
      });
      if (!tokens.length) return;

      const index = await buildTopSearchIndex();
      let bestEntry = null;
      let bestScore = 0;

      for (let i = 0; i < index.length; i += 1) {
        const entry = index[i];
        const score = scoreResult(entry, tokens);
        if (score > bestScore) {
          bestScore = score;
          bestEntry = entry;
        }
      }

      if (bestEntry) {
        window.location.assign(bestEntry.href);
        return;
      }

      const host = window.location.hostname;
      const externalQuery = encodeURIComponent('site:' + host + ' ' + trimmedQuery);
      window.location.assign('https://duckduckgo.com/?q=' + externalQuery);
    }

    function injectTopSearch() {
      const navBtnBar = document.querySelector('#_navbar .nav-btn-bar');
      if (!navBtnBar || navBtnBar.querySelector('.top-search-form')) return;

      const form = document.createElement('form');
      form.className = 'top-search-form';
      form.setAttribute('role', 'search');

      const input = document.createElement('input');
      input.type = 'search';
      input.className = 'top-search-input';
      input.placeholder = 'Search…';
      input.setAttribute('aria-label', 'Search site');

      form.appendChild(input);
      navBtnBar.appendChild(form);

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const query = input.value.trim();
        if (!query) return;

        const openedBuiltInSearch = await openBuiltInSearch(query);
        if (!openedBuiltInSearch) {
          await runFallbackSiteSearch(query);
        }
      });

      buildTopSearchIndex();
    }

    const pushState = document.getElementById('_pushState');
    if (pushState) {
      pushState.addEventListener('load', injectTopSearch);
      pushState.addEventListener('hy-push-state-after', injectTopSearch);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', injectTopSearch);
    } else {
      injectTopSearch();
    }
  })();
</script>

<!--
Example code for using Matamo as alternative analytics solution.
-->
{% if site.matomo_analytics %}
<script>
  var _paq = _paq || [];

  /*{% if site.matomo_analytics.no_cookies %}*/
  _paq.push(['disableCookies']);
  /*{% endif %}*/

  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['setTrackerUrl', u+'piwik.php']);
  _paq.push(['setSiteId', '{{site.matomo_analytics.site_id}}']);

  var pushStateEl = document.getElementById('_pushState');
  var timeStartLoadPage, referer, timeItTookToLoadPage;

  pushStateEl.addEventListener('hy-push-state-start', function() {
    timeStartLoadPage = new Date().getTime();
    referer = window.location.toString();
  });

  pushStateEl.addEventListener('hy-push-state-ready', function() {
    timeItTookToLoadPage = new Date().getTime() - timeStartLoadPage;
  });

  pushStateEl.addEventListener('hy-push-state-after', function() {
    _paq.push(['setReferrerUrl', referer]);
    _paq.push(['setCustomUrl', window.location.toString()]);
    _paq.push(['setDocumentTitle', document.title]);
    _paq.push(['deleteCustomVariables', 'page']);
    _paq.push(['setGenerationTimeMs', timeItTookToLoadPage]);
    _paq.push(['trackPageView']);
  });

  window.loadJSDeferred('{{site.matomo_analytics.root}}piwik.js');
</script>
{% endif %}
{% endcomment %}
